name: Rust

on:
  push:
    tags:
      - "v*"
env:
  CARGO_TERM_COLOR: always

jobs:
  windows:
    name: Check on Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check debug code
        run: >
          cargo check
          # --verbose
      - name: Check release code
        run: >
          cargo check
          --release
          # --verbose
  linux:
    name: Check on Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check debug code
        run: >
          cargo check
          # --verbose
      - name: Check release code
        run: >
          cargo check
          --release
          # --verbose
  publish-linux:
    name: Publish Linux crates
    needs: [windows, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Publish Linux-compatible crates
        run: |
          set -e
          CRATES=(rs-can socketcan-rs zlgcan)

          for CRATE in "${CRATES[@]}"; do
            echo "Checking $CRATE version..."
            VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r \
              ".packages[] | select(.name==\"$CRATE\") | .version")
            if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
              echo "Could not resolve package version for $CRATE"
              exit 1
            fi
            echo "Detected $CRATE version: $VERSION"
            EXISTS=$(curl -s https://crates.io/api/v1/crates/${CRATE} | jq -r \
              '.versions[]? | select(.num=="'"$VERSION"'") | .num' || true)
            
            if [ "$EXISTS" == "$VERSION" ]; then
              echo "$CRATE version $VERSION is already published. Skipping."
            else
              echo "Publishing $CRATE..."
              cargo publish -p ${CRATE} --locked --verbose --token ${{ secrets.CRATES_TOKEN }}
              echo "Waiting for crates.io to sync..."
              sleep 15
            fi
          done

  publish-windows:
    name: Publish nican on i686 Windows
    needs: [windows, linux]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Add i686 Windows target
        run: rustup target add i686-pc-windows-msvc
      - name: Publish nican (i686 only)
        shell: bash
        run: |
          set -e
          CRATE=nican
          echo "Checking $CRATE version..."
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r \
            ".packages[] | select(.name==\"$CRATE\") | .version")
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Could not resolve package version for $CRATE"
            exit 1
          fi
          echo "Detected $CRATE version: $VERSION"
          EXISTS=$(curl -s https://crates.io/api/v1/crates/${CRATE} | jq -r \
            '.versions[]? | select(.num=="'"$VERSION"'") | .num' || true)

          if [ "$EXISTS" == "$VERSION" ]; then
            echo "$CRATE version $VERSION is already published. Skipping."
          else
            echo "Publishing $CRATE for i686-pc-windows-msvc..."
            cargo publish -p ${CRATE} --target i686-pc-windows-msvc --locked --verbose --token ${{ secrets.CRATES_TOKEN }}
            echo "Waiting for crates.io to sync..."
            sleep 15
          fi
